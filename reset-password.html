<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Réinitialisation mot de passe — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center}
.logo{width:80px;height:80px;background:#CC0000;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem}
h2{margin-bottom:8px;font-size:1.3rem}
p{color:#888;font-size:.88rem;margin-bottom:24px}
input{width:100%;padding:13px;border:2px solid #eee;border-radius:10px;font-size:.95rem;margin-bottom:14px;outline:none}
input:focus{border-color:#CC0000}
button{width:100%;padding:14px;background:#CC0000;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
button:hover{background:#A30000}
button:disabled{background:#ccc;cursor:not-allowed}
.msg{margin-top:14px;font-size:.88rem;padding:10px;border-radius:8px;display:none}
.msg.success{background:#f0fdf4;color:#16a34a}
.msg.error{background:#fff2f2;color:#CC0000}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🔐</div>
  <h2>Nouveau mot de passe</h2>
  <p>Esprit du Pagne — Administration</p>
  <input type="password" id="pw1" placeholder="Nouveau mot de passe">
  <input type="password" id="pw2" placeholder="Confirmer le mot de passe">
  <button id="btn" onclick="updatePassword()">Mettre à jour</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://xxtkywcchutdhwcjawrz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4dGt5d2NjaHV0ZGh3Y2phd3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njk3MjAsImV4cCI6MjA5NDE0NTcyMH0.UzDTCSboartGYeiLJ6bo8P-3NibVMVEiBMLgkxdKSRQ';

let sb = null;

async function init() {
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  script.onload = async () => {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    // Récupérer le token depuis l'URL
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', ''));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (accessToken) {
      await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      showMsg('Session récupérée. Entrez votre nouveau mot de passe.', 'success');
    }
  };
  document.head.appendChild(script);
}

async function updatePassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const btn = document.getElementById('btn');

  if (!pw1 || pw1.length < 8) {
    showMsg('Le mot de passe doit contenir au moins 8 caractères', 'error'); return;
  }
  if (pw1 !== pw2) {
    showMsg('Les mots de passe ne correspondent pas', 'error'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Mise à jour...';

  const { error } = await sb.auth.updateUser({ password: pw1 });

  btn.disabled = false;
  btn.textContent = 'Mettre à jour';

  if (error) {
    showMsg('Erreur : ' + error.message, 'error');
  } else {
    showMsg('✓ Mot de passe mis à jour ! Redirection...', 'success');
    setTimeout(() => window.location.href = 'admin.html', 2000);
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

init();
</script>
</body>
</html>
